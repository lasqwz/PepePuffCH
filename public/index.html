<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PepePuff Shop</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Главная страница -->
  <div id="homeView" class="page active">
    <div class="hero">
      <div class="hero-logo">🐸</div>
      <h1 class="hero-title">Pepe Puff</h1>
      <p class="hero-subtitle">Премиум жидкости для вейпа</p>
    </div>

    <div class="section">
      <h2 class="section-title">🔥 Популярные товары</h2>
      <div class="products-grid" id="popularProducts"></div>
    </div>

    <button class="btn-catalog" id="goToCatalog">
      Перейти в каталог →
    </button>
  </div>

  <!-- Каталог -->
  <div id="catalogView" class="page">
    <div class="page-header">
      <h1>Каталог</h1>
    </div>
    
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="ELFLIQ">ELFLIQ</button>
      <button class="filter-btn" data-filter="Exclusive">Exclusive</button>
      <button class="filter-btn" data-filter="VOZOL">VOZOL</button>
    </div>
    
    <div class="products-list" id="productsList"></div>
  </div>

  <!-- Корзина -->
  <div id="cartView" class="page">
    <div class="page-header">
      <h1>Корзина</h1>
    </div>
    
    <div class="cart-content">
      <div id="cartItems"></div>
      <div class="cart-total">
        <strong>Итого: <span id="totalPrice">0</span> CHF</strong>
      </div>
      <button id="checkoutBtn" class="btn-checkout">Оформить заказ</button>
    </div>
  </div>

  <!-- Нижняя навигация -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Главная</span>
    </button>
    <button class="nav-btn" data-page="catalog">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Каталог</span>
    </button>
    <button class="nav-btn" data-page="cart">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Корзина</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
