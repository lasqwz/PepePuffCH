<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛍️ Магазин</h1>
      <div class="cart-icon" id="cartIcon">
        🛒 <span id="cartCount">0</span>
      </div>
    </header>

    <div id="catalogView" class="view active">
      <div class="products" id="productsList"></div>
    </div>

    <div id="cartView" class="view">
      <h2>Корзина</h2>
      <div id="cartItems"></div>
      <div class="cart-total">
        <strong>Итого: <span id="totalPrice">0</span> ₽</strong>
      </div>
      <button id="checkoutBtn" class="btn-primary">Оформить заказ</button>
      <button id="backToShop" class="btn-secondary">Продолжить покупки</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
