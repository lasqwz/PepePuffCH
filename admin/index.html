<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель - Pepe Puff</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 30px; color: #333; }
    
    .login-form {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .login-form h2 { margin-bottom: 20px; text-align: center; }
    .login-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .login-form button {
      width: 100%;
      padding: 12px;
      background: #0088cc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #0088cc; }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 12px 24px;
      background: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .tab.active { background: #0088cc; color: white; }
    
    .content { display: none; }
    .content.active { display: block; }
    
    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th { background: #f8f8f8; font-weight: 600; }
    
    .status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status.new { background: #FFF3CD; color: #856404; }
    .status.processing { background: #D1ECF1; color: #0C5460; }
    .status.completed { background: #D4EDDA; color: #155724; }
    .status.cancelled { background: #F8D7DA; color: #721C24; }
    
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 5px;
    }
    .btn-primary { background: #0088cc; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    
    .order-items {
      font-size: 12px;
      color: #666;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div id="loginForm" class="login-form">
    <h2>🐸 Pepe Puff Admin</h2>
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
  </div>

  <div id="adminPanel" style="display: none;">
    <div class="container">
      <h1>🐸 Админ-панель Pepe Puff</h1>
      
      <div class="stats">
        <div class="stat-card">
          <h3>Всего заказов</h3>
          <div class="value" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
          <h3>Новые заказы</h3>
          <div class="value" id="newOrders">0</div>
        </div>
        <div class="stat-card">
          <h3>Общая выручка</h3>
          <div class="value" id="totalRevenue">0 CHF</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('orders')">Заказы</button>
        <button class="tab" onclick="showTab('users')">Пользователи</button>
      </div>

      <div id="ordersContent" class="content active">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Дата</th>
              <th>Пользователь</th>
              <th>Товары</th>
              <th>Сумма</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>

      <div id="usersContent" class="content">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Telegram</th>
              <th>Имя</th>
              <th>Город</th>
              <th>Телефон</th>
              <th>Дата регистрации</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let authToken = '';

    function login() {
      const password = document.getElementById('password').value;
      authToken = password;
      
      fetch('/admin/api/stats', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
      .then(res => {
        if (res.ok) {
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          loadData();
        } else {
          alert('Неверный пароль!');
        }
      });
    }

    function loadData() {
      loadStats();
      loadOrders();
      loadUsers();
    }

    function loadStats() {
      fetch('/admin/api/stats', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('totalOrders').textContent = data.totalOrders;
        document.getElementById('newOrders').textContent = data.newOrders;
        document.getElementById('totalRevenue').textContent = data.totalRevenue.toFixed(2) + ' CHF';
      });
    }

    function loadOrders() {
      fetch('/admin/api/orders', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
      .then(res => res.json())
      .then(orders => {
        const tbody = document.getElementById('ordersTable');
        tbody.innerHTML = orders.map(order => {
          const items = JSON.parse(order.items);
          const itemsText = items.map(i => `${i.name} x${i.quantity}`).join(', ');
          const date = new Date(order.created_at).toLocaleString('ru-RU');
          
          return `
            <tr>
              <td>#${order.id}</td>
              <td>${date}</td>
              <td>
                @${order.telegram_username || 'unknown'}<br>
                <small>${order.user_name}</small>
              </td>
              <td class="order-items">${itemsText}</td>
              <td>${order.total} CHF</td>
              <td><span class="status ${order.status}">${order.status}</span></td>
              <td>
                <button class="btn btn-success" onclick="updateStatus(${order.id}, 'completed')">✓</button>
                <button class="btn btn-danger" onclick="updateStatus(${order.id}, 'cancelled')">✗</button>
              </td>
            </tr>
          `;
        }).join('');
      });
    }

    function loadUsers() {
      fetch('/admin/api/users', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
      .then(res => res.json())
      .then(users => {
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = users.map(user => {
          const date = new Date(user.registered_at).toLocaleString('ru-RU');
          return `
            <tr>
              <td>${user.id}</td>
              <td>@${user.telegram_username || 'unknown'}</td>
              <td>${user.name}</td>
              <td>${user.city}</td>
              <td>${user.phone || '-'}</td>
              <td>${date}</td>
            </tr>
          `;
        }).join('');
      });
    }

    function updateStatus(orderId, status) {
      fetch(`/admin/api/orders/${orderId}/status`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ status })
      })
      .then(() => {
        loadData();
      });
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tab + 'Content').classList.add('active');
    }
  </script>
</body>
</html>
